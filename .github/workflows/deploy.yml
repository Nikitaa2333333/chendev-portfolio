name: Deploy to Sprinthost

on:
  push:
    branches: [main]
  workflow_dispatch:

# одновременно — один деплой
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # rm lock-файла лечит конфликт Windows-lockfile с Linux-сборкой
      - name: Install & Build
        run: |
          rm -rf package-lock.json node_modules
          npm install
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/chendev1.ru/public_html/
          # Первый деплой: стирает старый React-сайт и заливает начисто.
          # ПОСЛЕ первого зелёного деплоя эту строку УДАЛИТЬ!
          dangerous-clean-slate: true
